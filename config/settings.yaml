environment: auto  # auto-detect: "local" if no CUDA, else "remote"

data:
  dataset: "microsoft/ms_marco"
  dataset_config: "v1.1"
  split_train: "train"
  split_dev: "validation"
  sample_cap: 100000  # use first 100k train queries for hard negative mining; overridden to null in remote_settings.yaml
  beir_corpus: "BeIR/msmarco"       # 8.8M passage corpus — used for BM25/FAISS indexing and eval
  beir_qrels: "BeIR/msmarco-qrels"  # validation qrels (7,440 pairs) — used for eval gold passages

chunking:
  max_tokens: 256
  min_tokens_merge: 64      # paragraphs shorter than this get merged with next
  tokenizer: "intfloat/e5-large-unsupervised"

bm25:
  top_k_retrieve: 100       # used by BM25Index.search() at eval time

mining:
  teacher: "intfloat/e5-large-unsupervised"           # "bm25" | "intfloat/e5-large-unsupervised" | "intfloat/e5-mistral-7b-instruct"
  # --- Teacher prefix config ---
  # e5-large-unsupervised:     query_prefix="query: ", passage_prefix="passage: "
  # e5-mistral-7b-instruct:    query_prefix="Instruct: Given a web search query, retrieve relevant passages that answer the query\nQuery: ", passage_prefix=""
  # bm25:                      both ignored
  teacher_query_prefix: "query: "
  teacher_passage_prefix: "passage: "
  teacher_batch_size: 64   # e5-large (335M, fp16): 64 fits comfortably on 16GB alongside FAISS index
  top_k_retrieve: 100       # candidates to retrieve from teacher before filtering
  n_hard_negatives: 5       # stored per query in JSONL; only 1 used during training
  max_triplets: null        # mine all ~532k queries; set a number to cap
  # --- Positive-aware hard negative filtering (NV-Retriever, arxiv:2407.15831) ---
  # Only applies when teacher is dense (not bm25). BM25 scores are unnormalized.
  positive_aware_method: null  # null | "topk_margin_pos" | "topk_perc_pos"
  margin_pos: 0.05             # topk_margin_pos: threshold = pos_score - margin_pos
  perc_pos: 0.95               # topk_perc_pos:   threshold = perc_pos * pos_score

model:
  bi_encoder: "intfloat/e5-large-unsupervised"
  bi_encoder_query_prefix: "query: "     # required by e5-large-unsupervised
  bi_encoder_passage_prefix: "passage: " # required by e5-large-unsupervised
  pretrained_msmarco_biencoder: "intfloat/e5-large-unsupervised"  # variant 2: same arch as student, no fine-tuning
  cross_encoder: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  hyde_model: "TheBloke/Mistral-7B-Instruct-v0.2-AWQ"
  hyde_quantization: "awq"
  hyde_gpu_memory_utilization: 0.4
  hyde_max_tokens: 200
  hyde_server_remote: "http://localhost:8000/v1/chat/completions"
  hyde_server_local: "http://localhost:11434/api/generate"
  hyde_timeout: 10

inference:
  query_rewriting: false    # toggle: spell check + WordNet synonym expansion before HyDE
  eval_batch_size: 32              # outer query batch for evaluation loop
  colbert_model: "lightonai/colbertv2.0"
  colbert_top_k: 50
  colbert_encode_batch_size: 32    # passages per ColBERT encode() forward pass
  crossencoder_top_k: 10
  crossencoder_batch_size: 8       # pairs per CrossEncoder predict() forward pass

training:
  global_batch_size: 256
  per_gpu_batch_size: 64
  grad_accumulation_steps: 2   # 64 * 2 * 2 GPUs = 256 effective
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  lr_scheduler: "cosine_with_hard_restarts"
  num_cycles: 3
  max_steps: 100000
  eval_every_steps: 10000
  checkpoint_every_steps: 5000
  early_stop_patience: 3
  fp16: true
  num_gpus: 2

faiss:
  index_type: "IVFFlat"     # overridden to "Flat" in local_settings.yaml
  nlist: 4096
  nprobe: 64
  use_gpu: false            # overridden to true in remote_settings.yaml

paths:
  data_dir: "data/"
  triplets_file: "data/triplets/hard_negatives.jsonl"
  bm25_index_dir: "data/index/bm25"
  faiss_index_path: "data/index/passages.faiss"
  faiss_index_pretrained_path: "data/index/passages_pretrained.faiss"
  passage_store_path: "data/index/passage_store.pkl"
  teacher_faiss_index_path: "data/index/teacher.faiss"
  teacher_passage_store_path: "data/index/teacher_passage_store.pkl"
  checkpoint_dir: "data/checkpoints/"
  best_model_dir: "data/checkpoints/best_model/"
